version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./output:/app/output
      - ./cache:/app/cache
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  streamlit:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./output:/app/output
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    environment:
      - STREAMLIT_SERVER_PORT=8501
    restart: unless-stopped

networks:
  default:
    name: national-stats-network
