# CDN Configuration for Static Assets
# This configuration can be used with Cloudflare, Fastly, or similar CDNs

# Cache Policy Configuration
# ==========================

# Static assets - cache for 1 year
/assets/*.css
/assets/*.js
/assets/*.json
/assets/*.svg
/assets/images/*
    Cache-Control: public, max-age=31536000, immutable

# HTML files - cache for 1 hour
/*.html
    Cache-Control: public, max-age=3600

# Fonts - cache for 1 year
/fonts/*
    Cache-Control: public, max-age=31536000, immutable

# API responses - cache for 5 minutes
/api/*
    Cache-Control: public, max-age=300, stale-while-revalidate=60

# Disable caching for dynamic content
/api/auth/*
    Cache-Control: no-store, no-cache, must-revalidate

# Security Headers
# ================

# HSTS (Uncomment if using HTTPS)
# Strict-Transport-Security: max-age=31536000; includeSubDomains

# X-Frame-Options
X-Frame-Options: DENY

# X-Content-Type-Options
X-Content-Type-Options: nosniff

# X-XSS-Protection
X-XSS-Protection: 1; mode=block

# Referrer-Policy
Referrer-Policy: strict-origin-when-cross-origin

# Content Security Policy (for development)
# Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:

# CORS Headers
# ============

# Allow cross-origin requests for CDN
Access-Control-Allow-Origin: *

# Compression
# ===========

# Enable gzip/brotli compression
Accept-Encoding: gzip, br
