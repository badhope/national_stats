<!-- 
  Header Component
  网站头部导航组件，包含 Logo、主导航、移动端菜单切换
  
  @usage: 直接嵌入到页面 <body> 顶部
  @accessibility: 符合 WCAG 2.1 AA 标准，支持键盘导航和屏幕阅读器
-->

<header class="header" role="banner" data-component="header">
    <div class="header__container">
        <!-- 品牌区域 -->
        <div class="header__brand">
            <svg class="header__logo" viewBox="0 0 40 40" aria-hidden="true" role="img">
                <title>National Stats Logo</title>
                <rect x="5" y="25" width="8" height="15" fill="currentColor" opacity="0.7"/>
                <rect x="16" y="15" width="8" height="25" fill="currentColor" opacity="0.85"/>
                <rect x="27" y="5" width="8" height="35" fill="currentColor"/>
            </svg>
            <div class="header__titles">
                <h1 class="header__title">宏观经济数据分析平台</h1>
                <p class="header__subtitle">National Economic Statistics Portal</p>
            </div>
        </div>
        
        <!-- 移动端菜单切换按钮 -->
        <button 
            class="header__toggle" 
            aria-label="切换导航菜单" 
            aria-expanded="false" 
            aria-controls="main-nav"
            type="button"
        >
            <span class="header__toggle-bar"></span>
            <span class="header__toggle-bar"></span>
            <span class="header__toggle-bar"></span>
        </button>
        
        <!-- 主导航 -->
        <nav class="nav" id="main-nav" aria-label="主导航" role="navigation">
            <ul class="nav__list" role="menubar">
                <li class="nav__item" role="none">
                    <a href="#home" class="nav__link nav__link--active" role="menuitem" tabindex="0">首页</a>
                </li>
                <li class="nav__item nav__item--has-submenu" role="none">
                    <a href="#data" class="nav__link" role="menuitem" aria-expanded="false" aria-haspopup="true" tabindex="0">
                        数据中心
                        <svg class="nav__arrow" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </a>
                    <ul class="nav__submenu" role="menu" aria-label="数据中心子菜单">
                        <li role="none">
                            <a href="#gdp" class="nav__submenu-link" role="menuitem" tabindex="-1">GDP 数据</a>
                        </li>
                        <li role="none">
                            <a href="#cpi" class="nav__submenu-link" role="menuitem" tabindex="-1">CPI 数据</a>
                        </li>
                        <li role="none">
                            <a href="#employment" class="nav__submenu-link" role="menuitem" tabindex="-1">就业数据</a>
                        </li>
                        <li role="none">
                            <a href="#trade" class="nav__submenu-link" role="menuitem" tabindex="-1">贸易数据</a>
                        </li>
                    </ul>
                </li>
                <li class="nav__item" role="none">
                    <a href="#analysis" class="nav__link" role="menuitem" tabindex="0">分析工具</a>
                </li>
                <li class="nav__item" role="none">
                    <a href="#reports" class="nav__link" role="menuitem" tabindex="0">报告中心</a>
                </li>
                <li class="nav__item" role="none">
                    <a href="#contact" class="nav__link" role="menuitem" tabindex="0">联系我们</a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<!-- 面包屑导航组件 -->
<nav class="breadcrumb" aria-label="面包屑导航" data-component="breadcrumb">
    <div class="breadcrumb__container">
        <ol class="breadcrumb__list" itemscope itemtype="https://schema.org/BreadcrumbList">
            <li class="breadcrumb__item" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                <a href="#home" itemprop="item">
                    <span itemprop="name">首页</span>
                </a>
                <meta itemprop="position" content="1" />
            </li>
            <li class="breadcrumb__item" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                <a href="#data" itemprop="item">
                    <span itemprop="name">数据中心</span>
                </a>
                <meta itemprop="position" content="2" />
            </li>
            <li class="breadcrumb__item breadcrumb__item--current" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem" aria-current="page">
                <span itemprop="name">GDP 数据分析</span>
                <meta itemprop="position" content="3" />
            </li>
        </ol>
    </div>
</nav>
