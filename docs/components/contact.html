<!-- 
  Contact Section Component
  联系我们表单区域，包含联系表单和联系信息
  
  @usage: 放在页面底部，Footer 之前
  @features: 表单验证、实时反馈、多联系方式展示
-->

<section class="contact" id="contact" aria-labelledby="contact-title" data-component="contact">
    <div class="contact__container">
        <div class="contact__grid">
            <!-- 左侧：联系信息 -->
            <div class="contact__info">
                <header class="contact__header">
                    <h2 class="contact__title" id="contact-title">联系我们</h2>
                    <p class="contact__subtitle">有任何问题？我们的团队随时为您提供帮助</p>
                </header>
                
                <div class="contact__methods">
                    <!-- 联系方式 1: 电话咨询 -->
                    <div class="contact-method">
                        <div class="contact-method__icon">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.49-5.15-3.8-6.62-6.63l1.97-1.57c.26-.26.36-.62.25-1-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3.3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="contact-method__content">
                            <h3 class="contact-method__title">电话咨询</h3>
                            <p class="contact-method__description">工作日 9:00-18:00</p>
                            <a href="tel:+86-10-12345678" class="contact-method__link">
                                📞 010-12345678
                            </a>
                        </div>
                    </div>
                    
                    <!-- 联系方式 2: 邮件咨询 -->
                    <div class="contact-method">
                        <div class="contact-method__icon">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="contact-method__content">
                            <h3 class="contact-method__title">邮件咨询</h3>
                            <p class="contact-method__description">24 小时内回复</p>
                            <a href="mailto:support@nationalstats.gov.cn" class="contact-method__link">
                                ✉️ support@nationalstats.gov.cn
                            </a>
                        </div>
                    </div>
                    
                    <!-- 联系方式 3: 办公地址 -->
                    <div class="contact-method">
                        <div class="contact-method__icon">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="contact-method__content">
                            <h3 class="contact-method__title">办公地址</h3>
                            <p class="contact-method__description">欢迎来访（需预约）</p>
                            <address class="contact-method__address">
                                北京市西城区月坛北街 1 号<br>
                                国家统计局大楼 8 层
                            </address>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：联系表单 -->
            <div class="contact__form-wrapper">
                <form class="contact__form" id="contact-form" novalidate data-component="contact-form">
                    <h3 class="contact__form-title">在线留言</h3>
                    
                    <!-- 姓名 -->
                    <div class="form-group">
                        <label for="contact-name" class="form-label">
                            姓名
                            <span class="form-required" aria-label="必填">*</span>
                        </label>
                        <input 
                            type="text" 
                            id="contact-name" 
                            name="name" 
                            class="form-input" 
                            required
                            autocomplete="name"
                            placeholder="请输入您的姓名"
                            aria-required="true"
                        >
                        <span class="form-error" id="name-error" role="alert" aria-live="polite"></span>
                    </div>
                    
                    <!-- 邮箱 -->
                    <div class="form-group">
                        <label for="contact-email" class="form-label">
                            邮箱
                            <span class="form-required" aria-label="必填">*</span>
                        </label>
                        <input 
                            type="email" 
                            id="contact-email" 
                            name="email" 
                            class="form-input" 
                            required
                            autocomplete="email"
                            placeholder="your@email.com"
                            aria-required="true"
                            aria-describedby="email-help"
                        >
                        <small id="email-help" class="form-help">我们不会泄露您的邮箱地址</small>
                        <span class="form-error" id="email-error" role="alert" aria-live="polite"></span>
                    </div>
                    
                    <!-- 主题 -->
                    <div class="form-group">
                        <label for="contact-subject" class="form-label">
                            主题
                            <span class="form-required" aria-label="必填">*</span>
                        </label>
                        <select 
                            id="contact-subject" 
                            name="subject" 
                            class="form-input form-select" 
                            required
                            aria-required="true"
                        >
                            <option value="">请选择咨询主题</option>
                            <option value="data">数据咨询</option>
                            <option value="technical">技术支持</option>
                            <option value="cooperation">合作洽谈</option>
                            <option value="feedback">意见反馈</option>
                            <option value="other">其他问题</option>
                        </select>
                        <span class="form-error" id="subject-error" role="alert" aria-live="polite"></span>
                    </div>
                    
                    <!-- 留言 -->
                    <div class="form-group">
                        <label for="contact-message" class="form-label">
                            留言内容
                            <span class="form-required" aria-label="必填">*</span>
                        </label>
                        <textarea 
                            id="contact-message" 
                            name="message" 
                            class="form-input form-textarea" 
                            rows="5" 
                            required
                            placeholder="请详细描述您的问题或需求..."
                            aria-required="true"
                        ></textarea>
                        <span class="form-error" id="message-error" role="alert" aria-live="polite"></span>
                    </div>
                    
                    <!-- 隐私政策同意 -->
                    <div class="form-group form-group--checkbox">
                        <label class="form-checkbox">
                            <input 
                                type="checkbox" 
                                name="privacy" 
                                class="form-checkbox__input"
                                required
                                aria-required="true"
                            >
                            <span class="form-checkbox__label">
                                我已阅读并同意
                                <a href="#privacy" class="form-link" target="_blank">隐私政策</a>
                                <span class="form-required" aria-label="必填">*</span>
                            </span>
                        </label>
                        <span class="form-error" id="privacy-error" role="alert" aria-live="polite"></span>
                    </div>
                    
                    <!-- 提交按钮 -->
                    <div class="form-actions">
                        <button type="submit" class="btn btn--primary btn--lg btn--block">
                            提交咨询
                            <svg class="btn__icon" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                    
                    <!-- 表单提示 -->
                    <div class="form-notice" role="status" aria-live="polite">
                        <p>通常会在 1-2 个工作日内回复，节假日顺延</p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
