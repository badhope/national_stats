name: Deploy Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  pre-deploy:
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.build.outputs.build_time }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Validate HTML
        run: |
          echo "Validating HTML structure..."
          # Basic validation
          if grep -q '<!DOCTYPE html>' docs/index.html; then
            echo "✓ DOCTYPE present"
          else
            echo "✗ DOCTYPE missing"
            exit 1
          fi
      
      - name: Check resource links
        run: |
          echo "Checking resource accessibility..."
          # Check that critical CSS/JS files exist
          if [ -f "docs/styles/main.css" ]; then
            echo "✓ main.css exists"
          else
            echo "✗ main.css missing"
            exit 1
          fi
          if [ -f "docs/scripts/main.js" ]; then
            echo "✓ main.js exists"
          else
            echo "✗ main.js missing"
            exit 1
          fi
      
      - name: Check manifest
        run: |
          if [ -f "docs/manifest/manifest.json" ]; then
            echo "✓ manifest.json exists"
            python3 -c "import json; json.load(open('docs/manifest/manifest.json'))" && echo "✓ Valid JSON"
          else
            echo "⚠ manifest.json missing"
          fi
      
      - name: Record build time
        id: build
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
      
      - name: Create build info
        run: |
          echo "Build: ${{ github.sha }}"
          echo "Time: ${{ steps.build.outputs.build_time }}"
          echo "Author: ${{ github.actor }}"

  deploy:
    needs: pre-deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: none

      - name: Create 404 page
        run: |
          cat > docs/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>404 - 页面未找到 | National Stats</title>
              <style>
                  body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; }
                  .container { text-align: center; }
                  h1 { color: #2563eb; font-size: 4rem; margin: 0; }
                  p { color: #64748b; font-size: 1.25rem; }
                  a { color: #2563eb; text-decoration: none; }
                  a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>404</h1>
                  <p>抱歉，您访问的页面不存在</p>
                  <p><a href="/">返回首页</a></p>
              </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  post-deploy:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Summary
        run: |
          echo "## 部署完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | ${{ needs.pre-deploy.outputs.build_time }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 部署URL | ${{ needs.deploy.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 提交 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
